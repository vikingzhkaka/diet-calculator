<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日饮食计算器 · 训练日 / 非训日</title>
<style>
  :root{
    --bg:#f5f7fa; --card:#ffffff; --ink:#1f2933; --sub:#6b7280;
    --line:#e5e7eb; --accent:#2563eb; --accent2:#059669; --warn:#d97706;
    --p:#2563eb; --c:#f59e0b; --f:#ef4444;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.6;padding:24px 16px 60px;font-variant-numeric:tabular-nums}
  .wrap{max-width:880px;margin:0 auto}
  h1{font-size:22px;font-weight:700;margin-bottom:12px;text-align:center}
  .lead{color:var(--sub);font-size:13px;margin-bottom:20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:18px 18px;margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .card h2{font-size:15px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .card h2 .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
  .collapsible .cbody{overflow:hidden;margin-top:14px}
  .collapsible.collapsed .cbody{display:none}
  .card .chead{margin-bottom:0;padding:5px 6px;margin-left:-6px;margin-right:-6px;border-radius:10px;
    cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;transition:background .15s}
  .card .chead:hover{color:var(--accent);background:#f1f5f9}
  .card .chead:active{background:#e2e8f0}
  .cval{margin-left:8px;font-size:12px;font-weight:600;color:var(--accent);
    background:#eef2ff;border-radius:999px;padding:2px 10px;white-space:nowrap}
  .chev{margin-left:auto;font-size:12px;color:var(--sub);transition:transform .2s;display:inline-block;line-height:1}
  .collapsed .chev{transform:rotate(-90deg)}

  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .field label{display:block;font-size:12px;color:var(--sub);margin-bottom:6px}
  .field input[type=number]{width:100%;padding:9px 10px;border:1px solid var(--line);
    border-radius:9px;font-size:15px;color:var(--ink)}
  .field input:focus{outline:none;border-color:var(--accent)}

  .preset{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
  .preset button{flex:1;min-width:120px;border:1px solid var(--line);background:#fff;
    padding:10px 8px;border-radius:10px;font-size:13px;color:var(--sub);cursor:pointer;
    font-weight:600;transition:.15s;text-align:center}
  .preset button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .pnote{font-size:12px;color:var(--warn);margin-top:8px;min-height:16px}

  .toggle{display:flex;background:#eef2f7;border-radius:10px;padding:4px;margin-top:16px}
  .toggle button{flex:1;border:none;background:transparent;padding:9px;border-radius:7px;
    font-size:14px;color:var(--sub);cursor:pointer;font-weight:600;transition:.15s}
  .toggle button.on{background:#fff;color:var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.1)}

  .slider-row{display:flex;align-items:center;gap:12px;margin-top:16px}
  .slider-row input[type=range]{flex:1;accent-color:var(--accent)}
  .slider-val{font-weight:700;color:var(--accent);min-width:62px;text-align:right;font-size:15px}

  .targets{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:4px}
  .tbox{background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:12px;text-align:center}
  .tbox .v{font-size:19px;font-weight:700}
  .tbox .k{font-size:11px;color:var(--sub);margin-top:2px}
  .tbox.p .v{color:var(--p)} .tbox.c .v{color:var(--c)} .tbox.f .v{color:var(--f)}

  .meal{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:12px;background:#fff}
  .meal .mhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .meal .mname{font-weight:700;font-size:14px}
  .meal .mtime{font-size:12px;color:var(--sub)}
  .meal .mmac{font-size:11px;color:var(--sub)}
  .foods{display:flex;flex-wrap:wrap;gap:7px}
  .food{background:#f1f5f9;border-radius:8px;padding:8px 12px;font-size:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .food select{border:1px solid var(--accent);border-radius:8px;font-size:14px;color:var(--accent);
    font-weight:700;padding:7px 8px;background:#fff;max-width:150px;cursor:pointer;min-height:38px}
  .food b{color:var(--ink)}
  .food .q{color:var(--accent);font-weight:700}
  .food .mac{color:var(--sub);font-size:11px}

  .bar{height:14px;border-radius:7px;background:#eef2f7;overflow:hidden;display:flex;margin-top:6px}
  .bar i{height:100%;display:block}
  .bar .bp{background:var(--p)} .bar .bc{background:var(--c)} .bar .bf{background:var(--f)}
  .legend{display:flex;gap:16px;font-size:12px;color:var(--sub);margin-top:8px;flex-wrap:wrap}
  .legend span b{color:var(--ink)}
  .delta{font-size:12px;margin-top:6px}
  .delta.ok{color:var(--accent2)} .delta.off{color:var(--warn)}

  .tips{font-size:13px;color:var(--sub)}
  .tips li{margin-bottom:6px;list-style:none;padding-left:16px;position:relative}
  .tips li:before{content:"›";position:absolute;left:2px;color:var(--accent);font-weight:700}
  .foot{font-size:11px;color:#9ca3af;text-align:center;margin-top:24px}

  .sub{font-size:12px;color:var(--sub);font-weight:600;margin:2px 0 8px}
  .supp-row{display:flex;align-items:center;gap:10px;padding:9px 2px;border-bottom:1px dashed var(--line)}
  .supp-row:last-child{border-bottom:none}
  .supp-row .sname{font-weight:600;font-size:14px;min-width:78px}
  .supp-row .snote{font-size:11px;color:var(--sub);flex:1;line-height:1.4}
  .stepper{display:flex;align-items:center;gap:6px}
  .stepper button{width:28px;height:28px;border:1px solid var(--line);background:#fff;border-radius:8px;
    font-size:16px;line-height:1;cursor:pointer;color:var(--accent);font-weight:700}
  .stepper button:active{background:#eef2ff}
  .stepper .sq{min-width:36px;text-align:center;font-weight:700;font-size:14px}
  .mchip{display:inline-flex;align-items:center;gap:6px;padding:7px 11px;border:1px solid var(--line);
    border-radius:999px;font-size:13px;cursor:pointer;margin:4px 8px 4px 0;background:#fff;transition:.15s;user-select:none}
  .mchip.on{background:#eef2ff;border-color:var(--accent);color:var(--accent);font-weight:600}
  .mchip .amt{font-size:11px;color:var(--sub)}
  .mchip.on .amt{color:var(--accent)}
  .mchip .when{font-size:10px;background:#f1f5f9;border-radius:6px;padding:1px 6px;color:var(--sub);font-weight:400}
  .delta.supp{color:var(--sub);font-weight:400;margin-top:4px}
  @media(max-width:620px){
    body{padding:16px 12px 48px}
    .grid{grid-template-columns:1fr 1fr}
    .targets{grid-template-columns:1fr 1fr}
    .preset{flex-direction:column}
    .preset button{padding:13px 10px;font-size:14px;min-height:46px}
    .toggle button{padding:12px;font-size:15px}
    .field input[type=number]{padding:11px 12px;font-size:16px}
    .meal .mhead{flex-wrap:wrap;gap:4px}
    .meal .mmac{width:100%}
    .food{padding:8px 12px;font-size:14px;gap:8px}
    .food .mac{font-size:12px}
    .food select{font-size:14px;padding:7px 8px;min-height:40px}
    .tbox .v{font-size:18px}
    .lead{font-size:12px}
    .cval{font-size:11px;padding:2px 8px}
    .card .chead{padding:6px 6px}
    .supp-row{flex-wrap:wrap}
    .supp-row .snote{order:3;flex-basis:100%}
    .stepper{margin-left:auto}
  }
  @media(max-width:380px){
    h1{font-size:20px}
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>每日饮食计算器</h1>

  <div class="card collapsible collapsed" id="cardPreset">
    <h2 class="chead" role="button" tabindex="0" onclick="toggleCard('cardPreset')"><span class="dot"></span>场景预设 <span class="cval" id="presetVal"></span><span class="chev">▾</span></h2>
    <div class="cbody">
    <div class="preset" id="presetBar"></div>
    <div class="pnote" id="pnote"></div>
    </div>
  </div>

  <div class="card collapsible collapsed" id="cardParams">
    <h2 class="chead" role="button" tabindex="0" onclick="toggleCard('cardParams')"><span class="dot"></span>个人参数 <span class="cval" id="paramsVal"></span><span class="chev">▾</span></h2>
    <div class="cbody">
    <div class="grid">
      <div class="field"><label>身高 (cm)</label><input id="height" type="number" value="178"></div>
      <div class="field"><label>体重 (kg)</label><input id="weight" type="number" value="86"></div>
      <div class="field"><label>年龄 (岁，用于热量估算)</label><input id="age" type="number" value="36"></div>
    </div>
    <div class="slider-row">
      <label style="font-size:13px;color:var(--sub)">蛋白质目标</label>
      <input id="prot" type="range" min="1.2" max="2.5" step="0.1" value="1.8">
      <div class="slider-val"><span id="protval">1.8</span> g/kg</div>
    </div>
    <div class="toggle">
      <button id="btnTrain" class="on" onclick="setDay('train')">🔵 训练日</button>
      <button id="btnRest" onclick="setDay('rest')">⚪ 非训练日</button>
    </div>
    </div>
  </div>

  <div class="card">
    <h2><span class="dot"></span>当日营养目标</h2>
    <div class="targets">
      <div class="tbox p"><div class="v" id="tP">—</div><div class="k">蛋白质 (g)</div></div>
      <div class="tbox c"><div class="v" id="tC">—</div><div class="k">碳水 (g)</div></div>
      <div class="tbox f"><div class="v" id="tF">—</div><div class="k">脂肪 (g)</div></div>
      <div class="tbox"><div class="v" id="tK">—</div><div class="k">摄入热量 (kcal)</div></div>
    </div>
  </div>

  <div class="card">
    <h2><span class="dot"></span>当日食谱 <span style="font-size:11px;color:var(--sub);font-weight:400">（食物名可点击替换同类）</span></h2>
    <div id="meals"></div>
  </div>

  <div class="card collapsible" id="cardSupp">
    <h2 class="chead" role="button" tabindex="0" onclick="toggleCard('cardSupp')"><span class="dot"></span>💊 补剂记录 <span class="cval" id="suppVal"></span><span class="chev">▾</span></h2>
    <div class="cbody">
      <div class="sub">宏量补剂 · 计入每日蛋白 / 碳水</div>
      <div id="suppMacro"></div>
      <div class="sub" style="margin-top:14px">非宏量补剂 · 勾选已服（不计入宏量）</div>
      <div id="suppMicro"></div>
    </div>
  </div>

  <div class="card">
    <h2><span class="dot"></span>实际摄入 vs 目标</h2>
    <div class="bar" id="bar"></div>
    <div class="legend">
      <span>蛋白 <b id="lP">—</b></span>
      <span>碳水 <b id="lC">—</b></span>
      <span>脂肪 <b id="lF">—</b></span>
    </div>
    <div class="delta" id="delta"></div>
    <div class="delta supp" id="suppNote"></div>
  </div>

  <div class="card">
    <h2><span class="dot"></span>食物替换提示</h2>
    <ul class="tips" id="tips"></ul>
  </div>

  <div class="foot">本工具为营养参考，非医疗建议 · 数据基于《硬派健身》力量训练者营养框架</div>
</div>

<script>
// ---------- 食物数据库（每单位宏量：克单位=每克，其余=每标注单位） ----------
// role 用于缩放系数；swap 用于同类替换分组（同组内单位一致）
const FOODS = {
  // 红肉/禽（swap:meat，单位g）
  beef:      {name:'酱牛肉',  p:0.31, c:0.02, f:0.12, unit:'g', role:'prot', swap:'meat'},
  porklean:  {name:'瘦猪肉',  p:0.20, c:0.00, f:0.06, unit:'g', role:'prot', swap:'meat'},
  brisket:   {name:'牛腩',    p:0.18, c:0.00, f:0.15, unit:'g', role:'prot', swap:'meat'},
  chicken:   {name:'鸡胸肉',  p:0.24, c:0.00, f:0.015,unit:'g', role:'prot', swap:'meat'},
  chickenleg:{name:'鸡腿肉',  p:0.18, c:0.00, f:0.09, unit:'g', role:'prot', swap:'meat'},
  lamb:      {name:'羊肉',    p:0.20, c:0.00, f:0.10, unit:'g', role:'prot', swap:'meat'},
  // 水产（swap:fish，单位g）
  bass:      {name:'鲈鱼',    p:0.19, c:0.00, f:0.02, unit:'g', role:'prot', swap:'meat'},   // 家常清蒸鱼，纳入蛋白可替换组
  salmon:    {name:'三文鱼',  p:0.20, c:0.00, f:0.13, unit:'g', role:'prot', swap:'fish'},
  shrimp:    {name:'虾仁',    p:0.20, c:0.00, f:0.02, unit:'g', role:'prot', swap:'fish'},
  cod:       {name:'鳕鱼',    p:0.18, c:0.00, f:0.01, unit:'g', role:'prot', swap:'fish'},
  tuna:      {name:'金枪鱼罐头',p:0.26,c:0.00, f:0.01, unit:'g', role:'prot', swap:'fish'},
  basa:      {name:'巴沙鱼',  p:0.18, c:0.00, f:0.02, unit:'g', role:'prot', swap:'meat'},   // 平价白肉鱼，家常
  // 蛋/奶（swap:milk，单位250ml；蛋为个）
  egg:       {name:'全蛋',    p:6,    c:0.5,  f:5,    unit:'个', role:'prot', swap:'egg'},
  eggG:      {name:'水煮蛋',  p:0.13, c:0.01, f:0.10, unit:'g', role:'prot', swap:'meat'},   // 按克计，便于在蛋白档位替换（≈13g蛋白/100g）
  milkFull:  {name:'全脂牛奶',p:8,    c:12,   f:8,    unit:'250ml',role:'prot',swap:'milk'},
  milkSkim:  {name:'脱脂牛奶',p:8,    c:12,   f:0,    unit:'250ml',role:'prot',swap:'milk'},
  soy:       {name:'豆浆',    p:3,    c:1,    f:1.5,  unit:'250ml',role:'prot',swap:'milk'},
  yogurt:    {name:'希腊酸奶',p:0.10, c:0.03, f:0,    unit:'100g',role:'prot',swap:'yogurt'},
  // 植物蛋白（swap:plant，单位g）
  tofu:      {name:'豆腐',    p:0.08, c:0.02, f:0.04, unit:'g', role:'prot', swap:'meat'},   // 家常豆制品，纳入蛋白可替换组
  edamame:   {name:'毛豆',    p:0.11, c:0.07, f:0.05, unit:'g', role:'prot', swap:'meat'},   // 家常植物蛋白
  chickpea:  {name:'鹰嘴豆',  p:0.09, c:0.27, f:0.02, unit:'g', role:'prot', swap:'plant'},
  // 主食（swap:grain，单位g）
  mantou:    {name:'馒头',    p:0.07, c:0.47, f:0.01, unit:'g', role:'carb', swap:'grain'},
  rice:      {name:'米饭',    p:0.026,c:0.28, f:0.003,unit:'g', role:'carb', swap:'grain'},
  brownRice: {name:'杂粮饭',  p:0.025,c:0.25, f:0.005,unit:'g', role:'carb', swap:'grain'},
  oats:      {name:'燕麦片',  p:0.13, c:0.66, f:0.07, unit:'g', role:'carb', swap:'grain'},
  pasta:     {name:'意面',    p:0.12, c:0.25, f:0.01, unit:'g', role:'carb', swap:'grain'},
  quinoa:    {name:'藜麦',    p:0.04, c:0.18, f:0.01, unit:'g', role:'carb', swap:'grain'},
  wbread:    {name:'全麦面包',p:2.5,  c:14,   f:1,    unit:'片', role:'carb', swap:'bread'},
  // 薯类（swap:root，单位g）
  sweetPot:  {name:'红薯',    p:0.011,c:0.20, f:0.002,unit:'g', role:'carb', swap:'root'},
  purple:    {name:'紫薯',    p:0.011,c:0.20, f:0.002,unit:'g', role:'carb', swap:'root'},
  yam:       {name:'山药',    p:0.009,c:0.18, f:0.001,unit:'g', role:'carb', swap:'root'},
  potato:    {name:'土豆',    p:0.02, c:0.17, f:0.001,unit:'g', role:'carb', swap:'root'},
  // 水果（swap:fruit）
  banana:    {name:'香蕉',    p:1,    c:27,   f:0,    unit:'根', role:'carb', swap:'fruit'},
  apple:     {name:'苹果',    p:0.3,  c:14,   f:0,    unit:'个', role:'carb', swap:'fruit'},
  orange:    {name:'橙子',    p:0.08, c:11,   f:0,    unit:'个', role:'carb', swap:'fruit'},
  kiwi:      {name:'猕猴桃',  p:0.05, c:10,   f:0.04, unit:'个', role:'carb', swap:'fruit'},
  blueberry: {name:'蓝莓',    p:0.06, c:0.12, f:0.01, unit:'100g',role:'carb',swap:'berry'},
  // 蔬菜（swap:veg，单位g）
  broccoli:  {name:'西兰花',  p:0.03, c:0.07, f:0.004,unit:'g', role:'veg',  swap:'veg'},
  spinach:   {name:'菠菜',    p:0.03, c:0.02, f:0.004,unit:'g', role:'veg',  swap:'veg'},
  lettuce:   {name:'生菜',    p:0.01, c:0.02, f:0.001,unit:'g', role:'veg',  swap:'veg'},
  carrot:    {name:'胡萝卜',  p:0.01, c:0.08, f:0.001,unit:'g', role:'veg',  swap:'veg'},
  pepper:    {name:'青椒',    p:0.01, c:0.04, f:0.001,unit:'g', role:'veg',  swap:'veg'},
  cucumber:  {name:'黄瓜',    p:0.007,c:0.02, f:0.001,unit:'g', role:'veg',  swap:'veg'},
  // 脂肪/坚果（swap:fat，单位g）
  nuts:      {name:'坚果',    p:0.2,  c:0.2,  f:0.6,  unit:'g', role:'fat',  swap:'fat'},
  // 补剂（乳清保留在库以兼容；宏量补剂统一在「补剂记录」卡片用 MACRO_SUPP 管理）
  whey:      {name:'乳清蛋白粉',p:24,  c:3,    f:1,    unit:'勺', role:'prot', swap:'shake'},
  honey:     {name:'蜂蜜',    p:0,    c:17,   f:0,    unit:'×20g',role:'carb',swap:'sweet'},
};

// ---------- 补剂（独立于三餐，统一在「补剂记录」卡片管理） ----------
const MACRO_SUPP = {
  whey:   {name:'乳清蛋白粉', p:24, c:3,  f:1,   unit:'勺', step:0.5, note:'练后30分钟内吸收快'},
  bar:    {name:'蛋白棒',     p:20, c:25, f:6,   unit:'根', step:1,   note:'代餐/外出便携'},
};
const MICRO_SUPP = {
  creatine:   {name:'肌酸',     amt:'3g',    when:'每日',   note:'提升力量与恢复'},
  fishoil:    {name:'鱼油',     amt:'2g',    when:'每日',   note:'补Omega-3'},
  caffeine:   {name:'咖啡因',   amt:'200mg', when:'训前',   note:'提升训练专注'},
  multi:      {name:'复合维矿', amt:'1粒',   when:'每日',   note:'基础微量营养'},
  vitaminBCD: {name:'维生素BCD',amt:'1粒',   when:'每日',   note:'B族供能/C抗氧化/D促钙吸收'},
  coq10:      {name:'辅酶Q10',  amt:'100mg', when:'每日',   note:'护心/抗氧'},
  lcar:       {name:'左旋肉碱', amt:'500mg', when:'训练日', note:'训前促脂肪供能'},
  zma:        {name:'锌镁',     amt:'1片',   when:'睡前',   note:'助眠/睾酮支持'},
};
let macroQty = {whey:1, bar:0};
let microOn  = {};

// ---------- 预设（每个含 train / rest 两套模板，items 为 [食物key, 基础份量]） ----------
const PRESETS = {
  home:{
    label:'🏠 居家标准',
    note:'你的固定搭配：午餐酱牛肉+馒头，练后蛋白粉+蜂蜜。适合能自己做饭/带饭的日子。',
    train:[
      {name:'早餐',time:'7:30',items:[['egg',2],['oats',80],['milkFull',1]]},

let DAY='train', PRESET='home';
let swaps={};  // "preset|day|mealIdx|itemIdx" -> foodKey

function setDay(d){DAY=d;
  document.getElementById('btnTrain').classList.toggle('on',d==='train');
  document.getElementById('btnRest').classList.toggle('on',d==='rest');
  render();}
function setPreset(p){PRESET=p;
  document.querySelectorAll('#presetBar button').forEach(b=>b.classList.toggle('on',b.dataset.p===p));
  document.getElementById('pnote').textContent=PRESETS[p].note;
  render();}
function swap(id,key){swaps[id]=key;render();}
function toggleCard(id){const el=document.getElementById(id);if(el)el.classList.toggle('collapsed');}
function renderSupp(){
  const mEl=document.getElementById('suppMacro');
  mEl.innerHTML=Object.entries(MACRO_SUPP).map(([k,s])=>{
    const q=macroQty[k]||0;
    const qtxt=(s.step===1)?Math.round(q):(q%1===0?q:q.toFixed(1));
    return `<div class="supp-row"><span class="sname">${s.name}</span>`+
      `<span class="snote">${s.note} · ${s.p}P/${s.c}C/${s.f}F 每${s.unit}</span>`+
      `<span class="stepper"><button onclick="setMacro('${k}',${-s.step})">−</button>`+
      `<span class="sq">${qtxt}</span><button onclick="setMacro('${k}',${s.step})">+</button></span></div>`;
  }).join('');
  const cEl=document.getElementById('suppMicro');
  cEl.innerHTML=Object.entries(MICRO_SUPP).map(([k,m])=>{
    const on=microOn[k]?'on':'';
    return `<span class="mchip ${on}" onclick="toggleMicro('${k}')">${m.name} `+
      `<span class="amt">${m.amt}</span> <span class="when">${m.when}</span></span>`;
  }).join('');
}
function setMacro(k,d){macroQty[k]=Math.max(0,Math.round((macroQty[k]+d)*10)/10);render();}
function toggleMicro(k){microOn[k]=!microOn[k];render();}

function rg(v){return Math.max(5,Math.round(v/5)*5);}
function rq(v,u){
  if(u==='个'||u==='根'||u==='片'||u==='250ml')return Math.max(1,Math.round(v));
  if(u==='勺')return Math.round(v*2)/2;
  if(u==='×20g')return Math.max(1,Math.round(v));
  return Math.round(v*10)/10;}

function render(){
 try{
  const h=+document.getElementById('height').value||178;
  const w=+document.getElementById('weight').value||86;
  const age=+document.getElementById('age').value||36;
  const ppk=+document.getElementById('prot').value;
  document.getElementById('protval').textContent=ppk.toFixed(1);
  document.getElementById('presetVal').textContent=PRESETS[PRESET].label;
  document.getElementById('paramsVal').textContent=(DAY==='train'?'🔵 训练日':'⚪ 非训练日')+' · '+w+'kg · '+ppk.toFixed(1)+'g/kg';

  const activeMacro=Object.values(macroQty).filter(q=>q>0).length;
  const doneMicro=Object.keys(microOn).filter(k=>microOn[k]).length;
  const totalMicro=Object.keys(MICRO_SUPP).length;
  document.getElementById('suppVal').textContent='宏量'+activeMacro+'项 · 已服'+doneMicro+'/'+totalMicro;
  renderSupp();

  const tP=Math.round(w*ppk);
  const tC=Math.round(w*(DAY==='train'?4.5:2.8));
  const tF=Math.round(w*0.7);
  const tK=tP*4+tC*4+tF*9;
  document.getElementById('tP').textContent=tP;
  document.getElementById('tC').textContent=tC;
  document.getElementById('tF').textContent=tF;
  document.getElementById('tK').textContent=Math.round(tK);

  const tpl=PRESETS[PRESET][DAY];
  // 构建有效食物列表（应用用户替换）
  let eff=[];
  tpl.forEach((m,mi)=>m.items.forEach(([k,q],ii)=>{
    const id=`${PRESET}|${DAY}|${mi}|${ii}`;
    let key=swaps[id]||k;
    if(!FOODS[key]) key=k;
    eff.push({id,key,qty:q});
  }));
  // 基准宏量（用有效食物的基础份量）
  let bP=0,bC=0,bF=0;
  eff.forEach(it=>{const f=FOODS[it.key];bP+=f.p*it.qty;bC+=f.c*it.qty;bF+=f.f*it.qty;});
  const fP=tP/bP, fC=tC/bC, fF=tF/bF;

  let aP=0,aC=0,aF=0;
  const mealsEl=document.getElementById('meals');
  mealsEl.innerHTML='';
  tpl.forEach((m,mi)=>{
    let mp=0,mc=0,mf=0;
    const foodsHtml=m.items.map(([defKey,q],ii)=>{
      const id=`${PRESET}|${DAY}|${mi}|${ii}`;
      let key=swaps[id]||defKey;
      if(!FOODS[key]) key=defKey;
      const f=FOODS[key];
      const factor=f.role==='prot'?fP:f.role==='carb'?fC:f.role==='fat'?fF:1;
      const realQ=f.role==='veg'?q:(f.unit==='g'?rg(q*factor):q*factor);
      const dispQ=f.role==='veg'?q:(f.unit==='g'?rg(q*factor):rq(q*factor,f.unit));
      const cp=f.p*realQ, cc=f.c*realQ, cf=f.f*realQ;
      mp+=cp;mc+=cc;mf+=cf;aP+=cp;aC+=cc;aF+=cf;
      const qtyTxt=f.unit==='×20g'?(dispQ+'×20g'):(dispQ+' '+f.unit);
      // 同类替换下拉
      const opts=Object.entries(FOODS).filter(([_,v])=>v.swap===f.swap);
      let nameHtml;
      if(opts.length>1){
        const sel=opts.map(([kk,vv])=>`<option value="${kk}"${kk===key?' selected':''}>${vv.name}</option>`).join('');
        nameHtml=`<select onchange="swap('${id}',this.value)">${sel}</select>`;
      }else{
        nameHtml=`<b>${f.name}</b>`;
      }
      return `<span class="food">${nameHtml} <span class="q">${qtyTxt}</span>`+
             `<span class="mac">蛋${Math.round(cp)}/碳${Math.round(cc)}/脂${Math.round(cf)}</span></span>`;
    }).join('');
    const card=document.createElement('div');
    card.className='meal';
    card.innerHTML=`<div class="mhead"><div><span class="mname">${m.name}</span> `+
      `<span class="mtime">${m.time}</span></div>`+
      `<div class="mmac">蛋白${Math.round(mp)} · 碳水${Math.round(mc)} · 脂肪${Math.round(mf)}</div></div>`+
      `<div class="foods">${foodsHtml}</div>`;
    mealsEl.appendChild(card);
  });

  let sP=0,sC=0,sF=0;
  Object.entries(macroQty).forEach(([k,q])=>{if(q>0){const s=MACRO_SUPP[k];if(!s)return;sP+=s.p*q;sC+=s.c*q;sF+=s.f*q;}});
  aP+=sP;aC+=sC;aF+=sF;
  const totP=Math.round(aP),totC=Math.round(aC),totF=Math.round(aF);
  const totK=totP*4+totC*4+totF*9;
  const max=Math.max(totP,totC,totF,tP,tC,tF);
  document.getElementById('bar').innerHTML=
    `<i class="bp" style="width:${totP/max*100}%"></i>`+
    `<i class="bc" style="width:${totC/max*100}%"></i>`+
    `<i class="bf" style="width:${totF/max*100}%"></i>`;
  document.getElementById('lP').textContent=`${totP}/${tP} g`;
  document.getElementById('lC').textContent=`${totC}/${tC} g`;
  document.getElementById('lF').textContent=`${totF}/${tF} g`;

  const dP=totP-tP,dC=totC-tC,dF=totF-tF;
  const d=document.getElementById('delta');
  d.className='delta '+(Math.abs(dP)<=8&&Math.abs(dC)<=25&&Math.abs(dF)<=8?'ok':'off');
  d.textContent='实际合计 '+totK+' kcal ｜ 与目标差：蛋白 '+(dP>=0?'+':'')+dP+'g，碳水 '+
    (dC>=0?'+':'')+dC+'g，脂肪 '+(dF>=0?'+':'')+dF+'g'+
    (d.className==='delta ok'?' ✓ 合理范围内':' ⚠ 偏差较大，可微调主食/蛋白份量');
  document.getElementById('suppNote').textContent='补剂贡献：蛋白 '+Math.round(sP)+'g · 碳水 '+Math.round(sC)+'g · 脂肪 '+Math.round(sF)+'g';

  document.getElementById('tips').innerHTML=PRESETS[PRESET].tips[DAY].map(t=>`<li>${t}</li>`).join('');

  try{localStorage.setItem('diet_state',JSON.stringify({h,w,age,ppk,DAY,PRESET,swaps,macroQty,microOn}));}catch(e){}
 }catch(e){console.error('render error',e);}
}

// 预设按钮
const pb=document.getElementById('presetBar');
Object.entries(PRESETS).forEach(([k,v])=>{
  const b=document.createElement('button');
  b.dataset.p=k; b.textContent=v.label; b.onclick=()=>setPreset(k);
  pb.appendChild(b);
});
['height','weight','age','prot'].forEach(id=>document.getElementById(id).addEventListener('input',render));

try{
  const s=JSON.parse(localStorage.getItem('diet_state')||'{}');
  if(s.h)document.getElementById('height').value=s.h;
  if(s.w)document.getElementById('weight').value=s.w;
  if(s.age)document.getElementById('age').value=s.age;
  if(s.ppk)document.getElementById('prot').value=s.ppk;
  if(s.DAY)DAY=s.DAY;
  if(s.PRESET&&PRESETS[s.PRESET])PRESET=s.PRESET;
  if(s.swaps){const clean={};for(const kk in s.swaps){if(FOODS[s.swaps[kk]])clean[kk]=s.swaps[kk];}swaps=clean;}
  if(s.macroQty){const mq={};for(const kk in s.macroQty){if(MACRO_SUPP[kk])mq[kk]=s.macroQty[kk];}if(Object.keys(mq).length)macroQty=Object.assign({whey:0,bar:0},mq);}
  if(s.microOn){const mo={};for(const kk in s.microOn){if(MICRO_SUPP[kk])mo[kk]=!!s.microOn[kk];}microOn=mo;}
}catch(e){}
setPreset(PRESET);
setDay(DAY);
</script>
